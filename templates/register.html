{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold">Open a New Account</h2>
            <p class="text-muted">Join SecureTrust Bank today. Get a $1000 welcome bonus!</p>
        </div>

        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                {% if error %}
                <div class="alert alert-danger rounded-3">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label text-secondary fw-semibold">Choose a Username</label>
                        <input type="text" class="form-control form-control-lg bg-light" id="username" name="username"
                            placeholder="e.g. newuser99" required>
                    </div>
                    <div class="mb-5">
                        <label for="password" class="form-label text-secondary fw-semibold">Create a Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password"
                            name="password" required>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">Verify and Open
                        Account</button>

                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Already a customer? <a href="{{ url_for('login') }}"
                                class="text-primary fw-bold text-decoration-none">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
